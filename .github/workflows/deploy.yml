# Java 知识库 - 自动构建与部署工作流
# 触发条件：推送到 main 分支时自动执行
# 功能：Maven 编译验证 + VitePress 站点构建 + GitHub Pages 部署

name: Build and Deploy

on:
  push:
    branches: [main]
  # 允许手动触发
  workflow_dispatch:

# 设置 GitHub Pages 部署权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署任务运行
concurrency:
  group: pages
  cancel-in-progress: false

# 适配 Node.js 24（GitHub Actions 将于 2026-06-02 强制迁移）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 步骤 1：检出代码
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 步骤 2：安装 JDK 21 + Maven，编译验证代码示例
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile code examples
        run: mvn compile --batch-mode --no-transfer-progress
        working-directory: code-examples

      # 步骤 3：安装 Node.js 18 + pnpm，构建 VitePress 站点
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('docs/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install
        working-directory: docs

      # VitePress 构建时 deadLinks 配置会输出断链警告
      - name: Build VitePress site
        run: pnpm run build
        working-directory: docs

      # 步骤 4：上传构建产物，准备部署到 GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  # 部署到 GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
