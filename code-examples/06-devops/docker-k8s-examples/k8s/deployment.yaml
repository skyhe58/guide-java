# ============================================================
# Kubernetes Deployment + Service 示例
# Java 应用的标准 K8s 部署配置
# 使用方式：kubectl apply -f deployment.yaml
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app
  labels:
    app: java-app
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: java-app
  # 滚动更新策略
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1           # 最多多出 1 个 Pod
      maxUnavailable: 0     # 不允许不可用（最安全）
  template:
    metadata:
      labels:
        app: java-app
        version: v1
    spec:
      # 优雅停机等待时间（与 Spring Boot 的 graceful shutdown 配合）
      terminationGracePeriodSeconds: 60
      containers:
        - name: java-app
          image: my-java-app:1.0.0
          ports:
            - containerPort: 8080
              name: http
          # 环境变量
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: JAVA_OPTS
              value: "-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"
            # 从 Secret 读取数据库密码
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: password
            # 从 ConfigMap 读取配置
            - name: APP_CONFIG
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: app.name
          # 资源限制（HPA 依赖 requests 计算利用率）
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          # 挂载配置文件
          volumeMounts:
            - name: config-volume
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: app-config

---
# Service：为 Pod 提供稳定的访问入口
apiVersion: v1
kind: Service
metadata:
  name: java-app-svc
  labels:
    app: java-app
spec:
  selector:
    app: java-app
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP

---
# ConfigMap：应用配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  app.name: "java-app"
  application.yml: |
    server:
      port: 8080
      shutdown: graceful
    spring:
      profiles:
        active: k8s
    management:
      endpoints:
        web:
          exposure:
            include: health,info,prometheus
      endpoint:
        health:
          probes:
            enabled: true

---
# Secret：敏感配置
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
type: Opaque
data:
  username: YWRtaW4=        # admin (base64)
  password: cGFzc3dvcmQ=    # password (base64)
