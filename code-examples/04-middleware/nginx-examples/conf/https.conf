# ============================================================
# Nginx HTTPS + HTTP/2 配置示例
# ============================================================
# 本配置演示：
# 1. SSL 证书配置
# 2. TLS 版本和加密套件
# 3. HTTP/2 启用
# 4. HSTS 安全头
# 5. HTTP → HTTPS 重定向
# 6. SSL 会话缓存和 OCSP Stapling
#
# 启动方式：docker compose -f docker/docker-compose.nginx.yml up -d
# ============================================================

# ---- HTTP → HTTPS 重定向 ----
server {
    listen 80;
    server_name example.com www.example.com;

    # 所有 HTTP 请求 301 重定向到 HTTPS
    return 301 https://$host$request_uri;
}

# ---- HTTPS + HTTP/2 配置 ----
server {
    listen 443 ssl http2;
    server_name example.com www.example.com;

    # ---- SSL 证书 ----
    ssl_certificate /etc/nginx/ssl/example.com.crt;         # 证书文件（含中间证书链）
    ssl_certificate_key /etc/nginx/ssl/example.com.key;     # 私钥文件

    # ---- TLS 版本（禁用不安全的旧版本）----
    ssl_protocols TLSv1.2 TLSv1.3;

    # ---- 加密套件 ----
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';

    # ---- SSL 会话缓存（减少 TLS 握手次数）----
    ssl_session_cache shared:SSL:10m;       # 10MB 共享缓存
    ssl_session_timeout 10m;                # 会话超时 10 分钟
    ssl_session_tickets off;                # 禁用 Session Tickets（更安全）

    # ---- OCSP Stapling（加速证书验证）----
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/nginx/ssl/ca-bundle.crt;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ---- 安全响应头 ----
    # HSTS — 强制浏览器使用 HTTPS（有效期 1 年）
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # 防止点击劫持
    add_header X-Frame-Options "SAMEORIGIN" always;
    # 防止 MIME 类型嗅探
    add_header X-Content-Type-Options "nosniff" always;
    # XSS 防护
    add_header X-XSS-Protection "1; mode=block" always;

    # ---- 反向代理 ----
    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
