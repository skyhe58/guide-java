# ============================================================
# Nginx 负载均衡各策略配置示例
# ============================================================
# 本配置演示 Nginx 的五种负载均衡策略：
# 1. 轮询（Round Robin）— 默认
# 2. 加权轮询（Weighted）
# 3. IP Hash — Session 保持
# 4. 最少连接（Least Connections）
# 5. 一致性哈希（Consistent Hash）
#
# 启动方式：docker compose -f docker/docker-compose.nginx.yml up -d
# ============================================================

# ---- 策略1: 轮询（默认）----
# 适用场景：后端服务器性能相近
upstream round_robin_backend {
    server 192.168.1.10:8080;
    server 192.168.1.11:8080;
    server 192.168.1.12:8080;
}

# ---- 策略2: 加权轮询 ----
# 适用场景：后端服务器性能不同，按能力分配流量
upstream weighted_backend {
    server 192.168.1.10:8080 weight=5;   # 50% 流量（高配服务器）
    server 192.168.1.11:8080 weight=3;   # 30% 流量（中配服务器）
    server 192.168.1.12:8080 weight=2;   # 20% 流量（低配服务器）
}

# ---- 策略3: IP Hash ----
# 适用场景：需要 Session 保持（同一客户端 IP 固定到同一后端）
# ⚠️ 注意：如果前面有 CDN/代理，所有请求可能来自同一 IP
upstream ip_hash_backend {
    ip_hash;
    server 192.168.1.10:8080;
    server 192.168.1.11:8080;
    server 192.168.1.12:8080;
}

# ---- 策略4: 最少连接 ----
# 适用场景：请求处理时间差异大（如长连接、大文件下载）
upstream least_conn_backend {
    least_conn;
    server 192.168.1.10:8080;
    server 192.168.1.11:8080;
    server 192.168.1.12:8080;
}

# ---- 策略5: 一致性哈希 ----
# 适用场景：缓存场景（相同 URI 固定到同一后端，提高缓存命中率）
upstream consistent_hash_backend {
    hash $request_uri consistent;
    server 192.168.1.10:8080;
    server 192.168.1.11:8080;
    server 192.168.1.12:8080;
}

# ---- 健康检查配置 ----
upstream health_check_backend {
    server 192.168.1.10:8080 max_fails=3 fail_timeout=30s;  # 3 次失败后标记不可用，30s 后重试
    server 192.168.1.11:8080 max_fails=3 fail_timeout=30s;
    server 192.168.1.12:8080 backup;                         # 备用服务器（主服务器全部不可用时启用）
    server 192.168.1.13:8080 down;                           # 标记为永久下线
}

server {
    listen 80;
    server_name lb.example.com;

    # 使用加权轮询策略（可替换为其他 upstream）
    location / {
        proxy_pass http://weighted_backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 失败重试：请求失败时自动转发到下一个后端
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 10s;
    }
}
