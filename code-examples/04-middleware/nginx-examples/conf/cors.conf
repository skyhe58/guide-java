# ============================================================
# Nginx 跨域（CORS）配置示例
# ============================================================
# 本配置演示：
# 1. 基本 CORS 配置
# 2. 预检请求（OPTIONS）处理
# 3. 动态允许多个域名
# 4. 携带 Cookie 的跨域请求
#
# 启动方式：docker compose -f docker/docker-compose.nginx.yml up -d
# ============================================================

# ---- 动态匹配允许的域名 ----
# 使用 map 指令根据 Origin 头动态设置允许的域名
# 比 Access-Control-Allow-Origin: * 更安全
map $http_origin $cors_origin {
    default "";                                    # 不允许的域名返回空
    "https://web.example.com" $http_origin;        # 生产前端
    "https://admin.example.com" $http_origin;      # 管理后台
    "http://localhost:3000" $http_origin;           # 本地开发
    "http://localhost:5173" $http_origin;           # Vite 开发服务器
    ~^https?://.*\.example\.com$ $http_origin;     # 所有子域名（正则匹配）
}

server {
    listen 80;
    server_name api.example.com;

    location /api/ {
        # ---- CORS 响应头 ----
        # 允许的源（动态匹配）
        add_header 'Access-Control-Allow-Origin' $cors_origin always;

        # 允许的 HTTP 方法
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;

        # 允许的请求头
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, Accept, Origin' always;

        # 允许浏览器读取的响应头
        add_header 'Access-Control-Expose-Headers' 'Content-Length, X-Request-Id' always;

        # 允许携带 Cookie（不能与 Allow-Origin: * 同时使用）
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        # 预检请求缓存时间（1 小时）
        add_header 'Access-Control-Max-Age' 3600 always;

        # ---- 处理 OPTIONS 预检请求 ----
        # 非简单请求（PUT/DELETE/自定义头/application/json）会先发 OPTIONS
        if ($request_method = 'OPTIONS') {
            # 预检请求直接返回 204，不转发到后端
            return 204;
        }

        # ---- 反向代理 ----
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 如果后端也返回了 CORS 头，去掉后端的（避免重复）
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
        proxy_hide_header 'Access-Control-Allow-Credentials';
    }
}
