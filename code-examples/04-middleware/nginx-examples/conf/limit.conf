# ============================================================
# Nginx 限流配置示例
# ============================================================
# 本配置演示：
# 1. limit_req — 请求速率限制（漏桶算法）
# 2. limit_conn — 并发连接数限制
# 3. burst 和 nodelay 参数
# 4. 不同接口的差异化限流
# 5. 限速下载
#
# 启动方式：docker compose -f docker/docker-compose.nginx.yml up -d
# ============================================================

# ---- 定义限流区域 ----

# 按客户端 IP 限制请求速率（10MB 共享内存，每秒 10 个请求）
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# 登录接口更严格的限流（每秒 2 个请求）
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=2r/s;

# 按客户端 IP 限制连接数
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# 按服务器限制总连接数
limit_conn_zone $server_name zone=server_conn_limit:10m;

server {
    listen 80;
    server_name api.example.com;

    # ---- API 接口限流 ----
    # burst=20: 允许突发 20 个请求排队
    # nodelay: 突发请求立即处理（不排队等待）
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;           # 超限返回 429 Too Many Requests

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ---- 登录接口严格限流（防暴力破解）----
    # burst=5: 只允许 5 个突发请求
    # 不加 nodelay: 突发请求排队等待（更平滑）
    location /api/login {
        limit_req zone=login_limit burst=5;
        limit_req_status 429;

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ---- 文件下载限流 ----
    # 限制每个 IP 最多 3 个并发连接
    # 限制每个连接的下载速度为 1MB/s
    location /download/ {
        limit_conn conn_limit 3;
        limit_conn_status 429;
        limit_rate 1m;                  # 每个连接限速 1MB/s
        limit_rate_after 10m;           # 前 10MB 不限速

        proxy_pass http://file_server;
    }

    # ---- 全站总连接数限制 ----
    location / {
        limit_conn server_conn_limit 10000;  # 全站最多 10000 个并发连接

        proxy_pass http://backend;
    }

    # ---- 限流错误页面 ----
    error_page 429 /429.html;
    location = /429.html {
        root /usr/share/nginx/html;
        internal;
    }
}
