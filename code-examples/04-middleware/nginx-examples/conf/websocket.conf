# ============================================================
# Nginx WebSocket 代理配置
# 将 WebSocket 连接代理到后端服务
# ============================================================

# WebSocket 需要 HTTP/1.1 + Upgrade 头才能正常工作
# Nginx 默认使用 HTTP/1.0 代理，需要显式设置

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream websocket_backend {
    # WebSocket 后端服务地址
    server 127.0.0.1:8080;
    server 127.0.0.1:8081;

    # WebSocket 是长连接，建议使用 ip_hash 保持会话
    ip_hash;
}

server {
    listen 80;
    server_name ws.example.com;

    # WebSocket 代理
    location /ws {
        proxy_pass http://websocket_backend;

        # 关键：设置 HTTP/1.1 和 Upgrade 头
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 传递客户端真实 IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket 超时设置（默认 60s，长连接需要加大）
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # 关闭缓冲，WebSocket 需要实时传输
        proxy_buffering off;
    }

    # 普通 HTTP 请求
    location / {
        proxy_pass http://websocket_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
